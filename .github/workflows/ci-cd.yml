name: CI/CD Frontend Innovatech
on:
  push:
    branches: [ "main" ]
jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verificar identidad AWS
        run: aws sts get-caller-identity

      - name: Build imagen Docker
        run: |
          docker build -t innovatech-frontend .
          echo "Imagen construida exitosamente"

      - name: Pipeline completado
        run: echo "Deploy realizado manualmente via CloudShell - Credenciales AWS Academy no permiten acceso ECS externo"
